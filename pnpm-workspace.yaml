# pnpm 10+ читает настройки из этого файла
# (поле "pnpm" в package.json больше не используется).

# Пин версии hono (транзитивная зависимость better-auth) —
# раньше жил в package.json -> pnpm.overrides
overrides:
  hono: 4.12.25

# Разрешение build/postinstall-скриптов зависимостей.
# Без этого pnpm блокирует скрипты и install падает с ERR_PNPM_IGNORED_BUILDS.

# Новый формат (pnpm 11+): true = разрешено, false = запрещено
allowBuilds:
  esbuild: true
  msw: true
  sharp: true

# Старый формат (pnpm 10.x) — оставлен для совместимости
onlyBuiltDependencies:
  - esbuild
  - msw
  - sharp
